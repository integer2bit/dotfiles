window_padding_width 5
font_size 12.0
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

# Ask before closing a Kitty OS window.
confirm_os_window_close 1

# Faster touchpad scrolling in Kitty scrollback.
touch_scroll_multiplier 4.0

# Use Kitty's split layout and Ctrl+Space as a pane-operation prefix.
enabled_layouts splits
map ctrl+space>v launch --location=vsplit
map ctrl+space>s launch --location=hsplit
map ctrl+space>h neighboring_window left
map ctrl+space>j neighboring_window bottom
map ctrl+space>k neighboring_window top
map ctrl+space>l neighboring_window right
map ctrl+space>x close_window
map ctrl+space>shift+r load_config_file

# Tmux-like tab navigation using Ctrl+Space as prefix.
map ctrl+space>c new_tab
map ctrl+space>n next_tab
map ctrl+space>p previous_tab
map ctrl+space>, set_tab_title
map ctrl+space>1 goto_tab 1
map ctrl+space>2 goto_tab 2
map ctrl+space>3 goto_tab 3
map ctrl+space>4 goto_tab 4
map ctrl+space>5 goto_tab 5
map ctrl+space>6 goto_tab 6
map ctrl+space>7 goto_tab 7
map ctrl+space>8 goto_tab 8
map ctrl+space>9 goto_tab 9

# Tmux-like tab bar.
tab_bar_edge top
# tab_bar_style powerline
# tab_powerline_style slanted
tab_bar_style separator
tab_separator "" 
tab_bar_align left
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_title_template " {index}: {title} "
active_tab_title_template " {index}: {title} "

# BEGIN_KITTY_THEME
# One Dark
include current-theme.conf
# END_KITTY_THEME
